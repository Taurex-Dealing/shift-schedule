<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Team Shift Schedule</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
    --text: #e2e8f0; --text-dim: #94a3b8; --border: #475569;
    --morning: #3b82f6; --morning7: #06b6d4; --evening: #f59e0b;
    --evening1: #ef4444; --evening15: #a855f7; --morning11: #10b981;
    --night: #6366f1; --holiday: #ec4899; --halfday: #14b8a6;
    --off: #64748b; --sick: #dc2626; --weekend-bg: rgba(255,255,255,0.03);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .header { background: linear-gradient(135deg, #1e3a5f, #0f172a); padding: 20px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
  .header h1 { font-size: 1.4rem; font-weight: 600; }
  .header h1 span { color: var(--morning); }
  .controls { display: flex; gap: 10px; align-items: center; }
  .month-btn { padding: 8px 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 6px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
  .month-btn:hover { background: var(--surface2); }
  .month-btn.active { background: var(--morning); border-color: var(--morning); color: #fff; font-weight: 600; }
  .refresh-btn { padding: 8px 14px; border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 6px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
  .refresh-btn:hover { background: var(--surface2); }
  .tabs { display: flex; gap: 0; padding: 0 30px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .tab { padding: 12px 24px; cursor: pointer; color: var(--text-dim); border-bottom: 2px solid transparent; transition: all 0.2s; font-size: 0.9rem; }
  .tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .tab.active { color: var(--morning); border-bottom-color: var(--morning); font-weight: 600; }
  .container { padding: 20px 30px; max-width: 100%; overflow-x: auto; }
  .schedule-table { border-collapse: collapse; width: 100%; min-width: 900px; }
  .schedule-table th, .schedule-table td { padding: 6px 8px; border: 1px solid var(--border); font-size: 0.8rem; text-align: center; white-space: nowrap; }
  .schedule-table th { background: var(--surface2); font-weight: 600; position: sticky; top: 0; z-index: 2; }
  .schedule-table th.staff-header { text-align: left; min-width: 140px; }
  .schedule-table td.staff-name { text-align: left; font-weight: 600; background: var(--surface); position: sticky; left: 0; z-index: 1; min-width: 140px; }
  .schedule-table td.weekend { background: var(--weekend-bg); }
  .schedule-table td.editable { cursor: pointer; transition: background 0.15s; }
  .schedule-table td.editable:hover { background: rgba(59,130,246,0.15); }
  .shift-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 500; color: #fff; }
  .shift-morning { background: var(--morning); }
  .shift-morning7 { background: var(--morning7); }
  .shift-evening { background: var(--evening); color: #000; }
  .shift-evening1 { background: var(--evening1); }
  .shift-evening15 { background: var(--evening15); }
  .shift-morning11 { background: var(--morning11); }
  .shift-morning8 { background: #059669; }
  .shift-night { background: var(--night); }
  .shift-holiday { background: var(--holiday); }
  .shift-halfday { background: var(--halfday); }
  .shift-off { background: var(--off); }
  .shift-sick { background: var(--sick); }
  .shift-evening2 { background: #dc2626; }
  .shift-morning7eest { background: #0d9488; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; padding: 15px 0; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; color: var(--text-dim); }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; min-width: 340px; max-width: 90vw; }
  .modal h3 { margin-bottom: 15px; font-size: 1.1rem; }
  .modal select { width: 100%; padding: 10px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; margin-bottom: 15px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-btns button { padding: 8px 18px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-size: 0.9rem; }
  .btn-save { background: var(--morning); color: #fff; border-color: var(--morning); }
  .btn-cancel { background: var(--surface2); color: var(--text); }
  .status-bar { padding: 8px 30px; font-size: 0.8rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .status-bar.saving { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .status-bar.saved { background: rgba(134,239,172,0.1); color: #86efac; }
  .status-bar.error { background: rgba(239,68,68,0.15); color: #fca5a5; }
  .status-bar.loading { background: rgba(59,130,246,0.1); color: #93c5fd; }
  @media (max-width: 768px) {
    .header { padding: 15px; }
    .container { padding: 10px; }
    .header h1 { font-size: 1.1rem; }
  }
</style>
</head>
<body>
<div class="header">
  <h1><span>Team</span> Shift Schedule</h1>
  <div class="controls">
    <button class="refresh-btn" onclick="loadData()" title="Refresh to see others' changes">Refresh</button>
    <button class="refresh-btn" onclick="document.getElementById('excelInput').click()" title="Upload Excel to replace schedule" style="background:#059669;border-color:#059669;color:#fff;">Upload Excel</button>
    <input type="file" id="excelInput" accept=".xlsx,.xls" style="display:none" onchange="handleExcelUpload(this)">
    <button class="month-btn" data-month="Feb26" onclick="switchMonth('Feb26')">Feb 2026</button>
    <button class="month-btn active" data-month="Mar26" onclick="switchMonth('Mar26')">Mar 2026</button>
  </div>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('schedule')">Schedule</div>
  <div class="tab" onclick="switchTab('weekend')">Weekend Shifts</div>
</div>
<div id="statusBar" class="status-bar saved">Schedule loaded.</div>
<div class="container" id="content"></div>
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3 id="modalTitle">Edit Shift</h3>
    <select id="shiftSelect">
      <option value="">-- No Shift --</option>
      <option value="Morning Shift">Morning Shift</option>
      <option value="Morning (7 MYT)">Morning (7 MYT)</option>
      <option value="Morning (7 EEST)">Morning (7 EEST)</option>
      <option value="Morning (8 EEST)">Morning (8 EEST)</option>
      <option value="Evening Shift">Evening Shift</option>
      <option value="Evening till 1 EET">Evening till 1 EET</option>
      <option value="Evening till 2 EET">Evening till 2 EET</option>
      <option value="Evening (15 MYT)">Evening (15 MYT)</option>
      <option value="Morning (11 EEST)">Morning (11 EEST)</option>
      <option value="Night Shift">Night Shift</option>
      <option value="Holiday">Holiday</option>
      <option value="Half day">Half day</option>
      <option value="-">Day Off (-)</option>
      <option value="Sick Leave">Sick Leave</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveShift()">Save</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="tokenModal">
  <div class="modal">
    <h3>Enter Edit Token</h3>
    <p style="font-size:0.85rem;color:var(--text-dim);margin-bottom:12px;">Paste the schedule edit token below. Ask your manager if you don't have it. You only need to do this once.</p>
    <input type="text" id="tokenInput" placeholder="github_pat_..." style="width:100%;padding:10px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:0.9rem;font-family:monospace;margin-bottom:15px;">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="cancelToken()">Cancel</button>
      <button class="btn-save" onclick="submitToken()">Save Token</button>
    </div>
  </div>
</div>

var NAME_MAP = { 'Nikolay': 'Nikolay Shumanov', 'Hayden': 'Hayden Ong' };
function normalizeName(n) { return NAME_MAP[n] || n; }
function normalizeData(data) {
  var d = JSON.parse(JSON.stringify(data));
  for (var month in d) {
    d[month].weeks.forEach(function(week) {
      week.staff.forEach(function(member) { member.name = normalizeName(member.name); });
    });
    d[month].staff_order = d[month].staff_order.map(normalizeName);
    var seen = {};
    d[month].staff_order = d[month].staff_order.filter(function(n) {
      if (seen[n]) return false; seen[n] = true; return true;
    });
  }
  return d;
}

function getShiftInfo(val) {
  if (!val) return null;
  var found = SHIFT_TYPES.find(function(s) { return s.key === val; });
  if (found) return found;
  found = SHIFT_TYPES.find(function(s) { return s.key.trim() === val.trim(); });
  if (found) return found;
  found = SHIFT_TYPES.find(function(s) { return val.includes(s.key.trim()) || s.key.trim().includes(val.trim()); });
  return found || { key: val, label: val, cls: 'shift-off', short: '?' };
}

function getMonthInfo(monthKey) {
  if (monthKey === 'Mar26') return { year: 2026, month: 2, name: 'March 2026', days: 31 };
  if (monthKey === 'Feb26') return { year: 2026, month: 1, name: 'February 2026', days: 28 };
  return { year: 2026, month: 0, name: 'Unknown', days: 30 };
}

function isWeekend(monthKey, dayNum) {
  if (!dayNum) return false;
  var info = getMonthInfo(monthKey);
  var day = new Date(info.year, info.month, dayNum).getDay();
  return day === 0 || day === 6;
}

function getDayName(monthKey, dayNum) {
  if (!dayNum) return '';
  var info = getMonthInfo(monthKey);
  return new Date(info.year, info.month, dayNum).toLocaleDateString('en', { weekday: 'short' });
}

function loadData() {
  setStatus('loading', 'Refreshing schedule...');
  fetch('data.json?t=' + Date.now())
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function(data) {
    scheduleData = normalizeData(data);
    setStatus('saved', 'Schedule refreshed: ' + new Date().toLocaleTimeString());
    render();
  })
  .catch(function(err) {
    console.error('Refresh error:', err);
    setStatus('error', 'Could not refresh. Using last loaded data.');
  });
}

function saveData() {
  getPAT(function(pat) {
    if (!pat) { setStatus('error', 'Edit cancelled - no token provided.'); return; }
    setStatus('saving', 'Saving changes...');
    fetch(API_BASE + '?ref=' + BRANCH, {
      headers: { 'Authorization': 'token ' + pat, 'Accept': 'application/vnd.github.v3+json' }
    })
    .then(function(r) {
      if (r.status === 401 || r.status === 403) {
        localStorage.removeItem('schedule_pat');
        throw new Error('Bad token - cleared. Try saving again.');
      }
      if (!r.ok) throw new Error('Could not get file info: HTTP ' + r.status);
      return r.json();
    })
    .then(function(fileInfo) {
      var jsonStr = JSON.stringify(scheduleData, null, 2);
      var base64 = btoa(unescape(encodeURIComponent(jsonStr)));
      return fetch(API_BASE, {
        method: 'PUT',
        headers: { 'Authorization': 'token ' + pat, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
        body: JSON.stringify({ message: 'Update schedule - ' + new Date().toISOString(), content: base64, sha: fileInfo.sha, branch: BRANCH })
      });
    })
    .then(function(r) {
      if (!r.ok) {
        return r.json().then(function(err) {
          if (r.status === 409) { setStatus('error', 'Conflict - someone else edited. Refreshing...'); setTimeout(loadData, 1500); }
          else { setStatus('error', 'Save failed: ' + (err.message || r.status)); }
          throw new Error('Save failed');
        });
      }
      return r.json();
    })
    .then(function(result) { setStatus('saved', 'Changes saved! Last updated: ' + new Date().toLocaleTimeString()); })
    .catch(function(err) {
      if (err.message !== 'Save failed') { console.error('Save error:', err); setStatus('error', err.message || 'Failed to save.'); }
    });
  });
}

function buildWeekendShifts() {
  var monthMap = { 'Feb26': '02', 'Mar26': '03' };
  var currentMM = monthMap[currentMonth] || '03';
  var filtered = WEEKEND_SHIFTS.filter(function(s) {
    return s.date.split('.')[1] === currentMM;
  });
  var html = '<h2 style="margin-bottom:15px;font-size:1.1rem;">Weekend Shifts \u2014 ' + (currentMonth === 'Feb26' ? 'February' : 'March') + ' 2026</h2>';
  if (filtered.length === 0) {
    html += '<p style="color:var(--text-dim);">No weekend shifts for this month.</p>';
    document.getElementById('content').innerHTML = html;
    return;
  }
  html += '<table class="schedule-table" style="min-width:auto;max-width:700px;">';
  html += '<thead><tr>';
  html += '<th style="text-align:left;">Date</th>';
  html += '<th style="background:#6366f1;color:#fff;">Night</th>';
  html += '<th style="background:#3b82f6;color:#fff;">Morning</th>';
  html += '<th style="background:#f59e0b;color:#000;">Afternoon</th>';
  html += '</tr></thead><tbody>';
  filtered.forEach(function(s) {
    var parts = s.date.split('.');
    var day = parseInt(parts[0], 10);
    var mon = parseInt(parts[1], 10) - 1;
    var dt = new Date(2026, mon, day);
    var dayName = dt.toLocaleDateString('en', { weekday: 'short' });
    html += '<tr>';
    html += '<td style="text-align:left;font-weight:600;">' + dayName + ' ' + s.date + '</td>';
    html += '<td>' + s.night + '</td>';
    html += '<td>' + s.morning + '</td>';
    html += '<td>' + s.afternoon + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('content').innerHTML = html;
}

    buildWeekendShifts();
    return;
  }
  if (!scheduleData) return;
  var data = scheduleData[currentMonth];
  var info = getMonthInfo(currentMonth);
  var staffMap = {}; var staffOrder = [];
  data.weeks.forEach(function(week) {
    week.staff.forEach(function(member) {
      var name = member.name;
      if (!staffMap[name]) { staffMap[name] = {}; staffOrder.push(name); }
      for (var i = 0; i < 7; i++) {
        var dayNum = week.dates[i];
        if (dayNum && dayNum >= 1 && dayNum <= info.days) {
          if (member.shifts[i]) { staffMap[name][dayNum] = member.shifts[i]; }
        }
      }
    });
  });
  var seen = {}; var unique = [];
  staffOrder.forEach(function(n) { if (!seen[n]) { seen[n] = true; unique.push(n); } });
  var html = '<div class="legend">';
  SHIFT_TYPES.forEach(function(st) {
    html += '<div class="legend-item"><div class="legend-swatch ' + st.cls + '"></div>' + st.label + '</div>';
  });
  html += '</div>';
  html += '<table class="schedule-table"><thead><tr><th class="staff-header">Team Member</th>';
  for (var d = 1; d <= info.days; d++) {
    var we = isWeekend(currentMonth, d);
    var dn = getDayName(currentMonth, d);
    html += '<th' + (we ? ' style="background:rgba(100,116,139,0.3)"' : '') + '>' + dn + '<br>' + d + '</th>';
  }
  html += '</tr></thead><tbody>';
  unique.forEach(function(name) {
    html += '<tr><td class="staff-name">' + name + '</td>';
    for (var d = 1; d <= info.days; d++) {
      var we = isWeekend(currentMonth, d);
      var val = staffMap[name] ? staffMap[name][d] : null;
      var si = val ? getShiftInfo(val) : null;
      var weCls = we ? ' weekend' : '';
      var safeName = name.replace(/'/g, "\\'");
      html += '<td class="editable' + weCls + '" onclick="openEdit(\'' + safeName + '\',' + d + ')">';
      if (si) { html += '<span class="shift-badge ' + si.cls + '" title="' + si.label + '">' + si.short + '</span>'; }
      html += '</td>';
    }
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('content').innerHTML = html;
}

function openEdit(staffName, day) {
  editTarget = { staff: staffName, day: day };
  var data = scheduleData[currentMonth];
  var currentVal = '';
  data.weeks.forEach(function(week) {
    week.staff.forEach(function(member) {
      if (member.name === staffName) {
        var idx = week.dates.indexOf(day);
        if (idx >= 0 && member.shifts[idx]) { currentVal = member.shifts[idx]; }
      }
    });
  });
  document.getElementById('modalTitle').textContent = staffName + ' \u2014 Day ' + day;
  document.getElementById('shiftSelect').value = currentVal;
  document.getElementById('editModal').classList.add('show');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('show');
  editTarget = null;
}

function saveShift() {
  if (!editTarget) return;
  var val = document.getElementById('shiftSelect').value;
  var data = scheduleData[currentMonth];
  data.weeks.forEach(function(week) {
    var idx = week.dates.indexOf(editTarget.day);
    if (idx < 0) return;
    week.staff.forEach(function(member) {
      if (member.name === editTarget.staff) { member.shifts[idx] = val || null; }
    });
  });
  closeModal();
  render();
  saveData();
}

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { closeModal(); cancelToken(); } });
setInterval(function() { loadData(); }, 30000);

// Excel upload handler
function handleExcelUpload(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  setStatus('loading', 'Parsing Excel: ' + file.name + '...');
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      var parsed = parseExcelToSchedule(wb);
      if (parsed) {
        scheduleData[currentMonth] = parsed;
        render();
        saveData();
      } else {
        setStatus('error', 'Could not parse Excel. Check format: staff names in column A, day numbers in header row.');
      }
    } catch(err) {
      console.error('Excel error:', err);
      setStatus('error', 'Error reading Excel: ' + err.message);
    }
    input.value = '';
  };
  reader.readAsArrayBuffer(file);
}

function parseExcelToSchedule(workbook) {
  var currentData = scheduleData[currentMonth];
  var info = getMonthInfo(currentMonth);

  // Build known staff name lookup
  var knownNames = {};
  currentData.weeks.forEach(function(w) {
    w.staff.forEach(function(s) {
      knownNames[s.name.toLowerCase()] = s.name;
    });
  });
  Object.keys(NAME_MAP).forEach(function(k) {
    knownNames[k.toLowerCase()] = NAME_MAP[k];
  });

  // Build shift value lookup (short codes + full names + labels)
  var shiftLookup = {};
  SHIFT_TYPES.forEach(function(s) {
    shiftLookup[s.short.toUpperCase()] = s.key;
    shiftLookup[s.key.toLowerCase()] = s.key;
    shiftLookup[s.key.trim().toLowerCase()] = s.key;
    shiftLookup[s.label.toLowerCase()] = s.key;
  });
  shiftLookup['DAY OFF'] = '-';
  shiftLookup['OFF'] = '-';
  shiftLookup['MORNING'] = 'Morning Shift';
  shiftLookup['EVENING'] = 'Evening Shift';
  shiftLookup['NIGHT'] = 'Night Shift';

  function matchShift(val) {
    if (!val || !String(val).trim()) return null;
    var s = String(val).trim();
    if (s === '-') return '-';
    var up = s.toUpperCase();
    if (shiftLookup[up]) return shiftLookup[up];
    var lo = s.toLowerCase();
    if (shiftLookup[lo]) return shiftLookup[lo];
    // Partial match
    for (var i = 0; i < SHIFT_TYPES.length; i++) {
      if (lo.indexOf(SHIFT_TYPES[i].key.trim().toLowerCase()) >= 0) return SHIFT_TYPES[i].key;
      if (SHIFT_TYPES[i].key.trim().toLowerCase().indexOf(lo) >= 0 && lo.length > 3) return SHIFT_TYPES[i].key;
    }
    return s; // Return as-is if no match
  }

  function matchStaff(name) {
    if (!name) return null;
    var lo = String(name).trim().toLowerCase();
    if (!lo) return null;
    if (knownNames[lo]) return knownNames[lo];
    // Partial match
    var keys = Object.keys(knownNames);
    for (var i = 0; i < keys.length; i++) {
      if (lo.indexOf(keys[i]) >= 0 || keys[i].indexOf(lo) >= 0) return knownNames[keys[i]];
    }
    return null;
  }

  // Try each sheet
  for (var si = 0; si < workbook.SheetNames.length; si++) {
    var sheet = workbook.Sheets[workbook.SheetNames[si]];
    var rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

    // Find header row with day numbers (at least 5 numbers 1-31)
    var headerRow = -1;
    var dayColMap = {};
    for (var r = 0; r < Math.min(rows.length, 20); r++) {
      var row = rows[r];
      if (!row || row.length < 5) continue;
      var numCount = 0;
      var tempMap = {};
      for (var c = 1; c < row.length; c++) {
        var cv = String(row[c]).trim();
        var num = parseInt(cv);
        if (!isNaN(num) && num >= 1 && num <= info.days && !tempMap[c]) {
          numCount++;
          tempMap[c] = num;
        } else {
          var m = cv.match(/\\b(\\d{1,2})\\b/);
          if (m) {
            var dn = parseInt(m[1]);
            if (dn >= 1 && dn <= info.days && !tempMap[c]) { numCount++; tempMap[c] = dn; }
          }
        }
      }
      if (numCount >= 5) { headerRow = r; dayColMap = tempMap; break; }
    }
    if (headerRow < 0) continue;

    // Parse staff data rows
    var staffShifts = {};
    var staffOrder = [];
    for (var r = headerRow + 1; r < rows.length; r++) {
      var row = rows[r];
      if (!row || row.length < 2) continue;
      var staffName = matchStaff(row[0]);
      if (!staffName) continue;
      if (!staffShifts[staffName]) { staffShifts[staffName] = {}; staffOrder.push(staffName); }
      var cols = Object.keys(dayColMap);
      for (var ci = 0; ci < cols.length; ci++) {
        var col = parseInt(cols[ci]);
        var dayNum = dayColMap[cols[ci]];
        var shift = matchShift(row[col]);
        if (shift) staffShifts[staffName][dayNum] = shift;
      }
    }

    if (staffOrder.length < 3) continue;

    // Build week structure
    var weeks = [];
    var firstDow = new Date(info.year, info.month, 1).getDay();
    var weekStart = 1 - ((firstDow + 6) % 7);
    var weekNum = Math.ceil((1 + ((firstDow + 5) % 7)) / 7);
    while (weekStart <= info.days) {
      var dates = [];
      for (var i = 0; i < 7; i++) {
        var d = weekStart + i;
        dates.push((d >= 1 && d <= info.days) ? d : null);
      }
      var weekStaff = [];
      staffOrder.forEach(function(name) {
        var shifts = [];
        for (var i = 0; i < 7; i++) {
          var d = dates[i];
          shifts.push(d && staffShifts[name][d] ? staffShifts[name][d] : null);
        }
        weekStaff.push({ name: name, shifts: shifts });
      });
      weeks.push({ week: 'Week ' + weekNum, dates: dates, staff: weekStaff });
      weekStart += 7;
      weekNum++;
    }

    return { weeks: weeks, staff_order: staffOrder };
  }
  return null;
}
